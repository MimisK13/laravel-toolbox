name: Tests

on:
  push:
    branches:
      - main
      - work
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - laravel: '^12.0'
            testbench: '^10.0'
            phpunit: '^11.0'
          - laravel: '^13.0'
            testbench: '^11.0'
            phpunit: '^12.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
          extensions: mbstring, sqlite3, pdo_sqlite

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Set dependency matrix
        run: |
          composer require --no-interaction --no-update illuminate/support:${{ matrix.laravel }}
          composer require --dev --no-interaction --no-update orchestra/testbench:${{ matrix.testbench }} phpunit/phpunit:${{ matrix.phpunit }}

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: composer test

      - name: Run static analysis
        run: composer analyse
