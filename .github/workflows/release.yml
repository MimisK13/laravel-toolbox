name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Trigger Packagist update (optional)
        if: ${{ secrets.PACKAGIST_UPDATE_URL != '' }}
        run: curl -sS -X POST "${{ secrets.PACKAGIST_UPDATE_URL }}"
